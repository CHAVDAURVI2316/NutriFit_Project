<!doctype html>
<html lang="en">
  <!-- [Head] start -->
 {% load static %}
  
  <head>
    {% include 'head.html' %}
  </head>

  <body data-pc-preset="preset-1" data-pc-sidebar-caption="true" data-pc-direction="ltr" data-pc-theme="light">
    <!-- [ Pre-loader ] start -->
<div class="loader-bg">
  <div class="loader-track">
    <div class="loader-fill"></div>
  </div>
</div>
<!-- [ Pre-loader ] End -->

 <div class="auth-main">
      <div class="auth-wrapper v1">
        <div class="auth-form">
          <div class="position-relative">
            <div class="auth-bg">
              <span class="r"></span>
              <span class="r s"></span>
              <span class="r s"></span>
              <span class="r"></span>
            </div>
            <div class="card mb-0">
              <div class="card-body">
                 <form method="POST" enctype="multipart/form-data">
                   {% csrf_token %}
                <div class="text-center">
                  <img src="{% static 'img/nlogo.png' %}" alt="img" style="width: 200px; height: 200px;"/>
                  
                </div>
                  <h4 class="text-center f-w-500 mt-4 mb-3">Access Your Account.</h4>

                
                <div class="mb-3">
                  <label for="">Username</label>
                  <input type="text" class="form-control" id="floatingInput" name="l_username" placeholder="Enter Username" />
                </div>
                <div class="mb-3">
                  <label for="">Password</label>
                  <input type="password" class="form-control" name="l_password" placeholder="Enter Password" id="myInput" />
                </div>
                <div class="d-flex mt-1 justify-content-between align-items-center">
                  <div class="form-check">
                    <input class="form-check-input input-primary" type="checkbox" id="customCheckc1" onclick="myFunction()" />
                    <label class="form-check-label text-muted" for="customCheckc1">Show Password</label>
                  </div>
               
                </div>
                <div class="text-center mt-4">
                  <button type="submit" class="btn btn-primary shadow px-sm-4">Login</button>
                </div>
                </form>
                <br>

                 {% if msg != "" %}
                 <a href="#" class="btn btn-block btn-danger">
                    <i class="fab fa-meg mr-2"></i> {{msg}}
                  </a>
                  {% endif %}

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
     {% include 'script.html' %}
 
<script>
function myFunction() {
  var x = document.getElementById("myInput");
  if (x.type === "password") {
    x.type = "text";
  } else {
    x.type = "password";
  }
}
</script>
  </body>
  <!-- [Body] end -->

</html>
